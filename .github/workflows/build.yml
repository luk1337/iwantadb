name: build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r27b-linux.zip
        unzip android-ndk-r27b-linux.zip
    - name: Build (AArch64)
      run: |
        ANDROID_NDK_HOME=./android-ndk-r27b CXX=aarch64-linux-android35-clang++ ./build.sh
        zip -r iwantadb-aarch64.zip META-INF system
    - uses: actions/upload-artifact@v4
      with:
        name: iwantadb (AArch64)
        path: iwantadb-aarch64.zip
    - name: Build (ARMv7-A)
      run: |
        ANDROID_NDK_HOME=./android-ndk-r27b CXX=armv7a-linux-androideabi35-clang++ ./build.sh
        zip -r iwantadb-armv7a.zip META-INF system
    - uses: actions/upload-artifact@v4
      with:
        name: iwantadb (ARMv7-A)
        path: iwantadb-armv7a.zip
    - name: Build (i686)
      run: |
        ANDROID_NDK_HOME=./android-ndk-r27b CXX=i686-linux-android35-clang++ ./build.sh
        zip -r iwantadb-i686.zip META-INF system
    - uses: actions/upload-artifact@v4
      with:
        name: iwantadb (i686)
        path: iwantadb-i686.zip
    - name: Build (x86_64)
      run: |
        ANDROID_NDK_HOME=./android-ndk-r27b CXX=x86_64-linux-android35-clang++ ./build.sh
        zip -r iwantadb-x86_64.zip META-INF system
    - uses: actions/upload-artifact@v4
      with:
        name: iwantadb (x86_64)
        path: iwantadb-x86_64.zip
    - uses: marvinpinto/action-automatic-releases@latest
      if: github.ref == 'refs/heads/master'
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: false
        title: "${{ env.GITHUB_SHA }}"
        files: |
          iwantadb-aarch64.zip
          iwantadb-armv7a.zip
          iwantadb-i686.zip
          iwantadb-x86_64.zip
